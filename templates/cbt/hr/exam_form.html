{% extends "base.html" %}
{% block title %}{{ form_title }} — CBT{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">

    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
        <a href="{% url 'cbt:hr_exam_list' %}" class="hover:text-slate-700 dark:hover:text-slate-200 transition">Manage CBT</a>
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        <span class="text-slate-700 dark:text-slate-200 font-medium">{{ form_title }}</span>
    </nav>

    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200/80 dark:border-slate-800 shadow-sm overflow-hidden">
        <div class="h-1.5 bg-gradient-to-r from-emerald-500 to-teal-500"></div>
        <div class="p-8">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-teal-500 flex items-center justify-center shadow-md shadow-emerald-500/25">
                    <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 dark:text-slate-100">{{ form_title }}</h1>
                    <p class="text-sm text-slate-400 dark:text-slate-500">Fill in the exam details below</p>
                </div>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Title -->
                <div>
                    <label for="id_title" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">
                        Exam Title <span class="text-rose-500">*</span>
                    </label>
                    <input type="text" id="id_title" name="title" required
                           value="{{ exam.title|default:'' }}"
                           placeholder="e.g. Financial Regulations Assessment 2025"
                           class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                                  bg-slate-50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100
                                  text-sm font-medium placeholder-slate-400 dark:placeholder-slate-500
                                  focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-400 dark:focus:border-emerald-500
                                  transition">
                </div>

                <!-- Description -->
                <div>
                    <label for="id_description" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Instructions / Description</label>
                    <textarea id="id_description" name="description" rows="4"
                              placeholder="Add any instructions or context for staff before they begin the exam..."
                              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                                     bg-slate-50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100
                                     text-sm font-medium placeholder-slate-400 dark:placeholder-slate-500
                                     focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-400 dark:focus:border-emerald-500
                                     transition resize-none">{{ exam.description|default:'' }}</textarea>
                </div>

                <!-- Duration + Pass Mark -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="id_duration" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">
                            Duration (minutes) <span class="text-rose-500">*</span>
                        </label>
                        <input type="number" id="id_duration" name="duration_minutes"
                               min="1" max="480" required
                               value="{{ exam.duration_minutes|default:30 }}"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                                      bg-slate-50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100
                                      text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-400 dark:focus:border-emerald-500 transition">
                    </div>
                    <div>
                        <label for="id_pass_mark" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">
                            Pass Mark (%) <span class="text-rose-500">*</span>
                        </label>
                        <input type="number" id="id_pass_mark" name="pass_mark"
                               min="0" max="100" required
                               value="{{ exam.pass_mark|default:50 }}"
                               class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                                      bg-slate-50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100
                                      text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-400 dark:focus:border-emerald-500 transition">
                    </div>
                </div>

                <!-- Status -->
                <div>
                    <label for="id_status" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Status</label>
                    <select id="id_status" name="status"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700
                                   bg-slate-50 dark:bg-slate-800/50 text-slate-800 dark:text-slate-100
                                   text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-400 dark:focus:border-emerald-500 transition">
                        <option value="DRAFT" {% if exam.status == 'DRAFT' or not exam %}selected{% endif %}>Draft — not visible to staff</option>
                        <option value="ACTIVE" {% if exam.status == 'ACTIVE' %}selected{% endif %}>Active — available to assigned staff</option>
                        <option value="CLOSED" {% if exam.status == 'CLOSED' %}selected{% endif %}>Closed — no longer accessible</option>
                    </select>
                </div>

                <!-- Options -->
                <div class="space-y-3 p-5 rounded-xl bg-slate-50 dark:bg-slate-800/30 border border-slate-200 dark:border-slate-700">
                    <p class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">Exam Options</p>

                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="id_randomise" name="randomise_questions"
                               {% if exam.randomise_questions or not exam %}checked{% endif %}
                               class="w-4 h-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                        <span class="text-sm text-slate-600 dark:text-slate-400">
                            <span class="font-semibold text-slate-700 dark:text-slate-300">Randomise questions</span>
                            — shuffle question order for each attempt
                        </span>
                    </label>

                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="id_allow_multiple" name="allow_multiple_attempts"
                               {% if exam.allow_multiple_attempts %}checked{% endif %}
                               class="w-4 h-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                        <span class="text-sm text-slate-600 dark:text-slate-400">
                            <span class="font-semibold text-slate-700 dark:text-slate-300">Allow multiple attempts</span>
                            — staff can retake this exam
                        </span>
                    </label>

                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" id="id_show_answers" name="show_answers_after"
                               {% if exam.show_answers_after or not exam %}checked{% endif %}
                               class="w-4 h-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                        <span class="text-sm text-slate-600 dark:text-slate-400">
                            <span class="font-semibold text-slate-700 dark:text-slate-300">Show correct answers</span>
                            — staff can see correct answers after submission
                        </span>
                    </label>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-3 pt-2">
                    <button type="submit"
                            class="px-6 py-2.5 rounded-xl text-sm font-bold
                                   bg-gradient-to-r from-emerald-600 to-teal-600 text-white
                                   hover:from-emerald-700 hover:to-teal-700
                                   shadow-md shadow-emerald-500/25 hover:shadow-emerald-500/40
                                   transition flex items-center gap-2">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                        </svg>
                        {% if exam %}Save Changes{% else %}Create Exam{% endif %}
                    </button>
                    <a href="{% url 'cbt:hr_exam_list' %}"
                       class="px-5 py-2.5 rounded-xl text-sm font-semibold
                              bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300
                              hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
